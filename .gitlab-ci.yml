# GitLab CI/CD Pipeline — Astro + Cloudflare Pages
# Last triggered: 2026-06-13T07:40
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   CLOUDFLARE_API_TOKEN     — Cloudflare API token with "Cloudflare Pages:Edit" permission
#   CLOUDFLARE_ACCOUNT_ID    — Your Cloudflare account ID
#   SUPABASE_URL             — Supabase project URL
#   SUPABASE_KEY             — Supabase anon/public key
#   UPSTASH_REDIS_REST_URL   — Upstash Redis REST URL
#   UPSTASH_REDIS_REST_TOKEN — Upstash Redis REST token
#   TMDB_API_KEY             — TMDB API key

# NOTE: We do NOT cache node_modules because @astrojs/cloudflare depends on
# @cloudflare/workerd-linux-64, a platform-specific optional binary that is
# stripped out when the cache is created on one runner and restored on another.
# Running `npm ci` fresh in every job is the only reliable approach.

# IMPORTANT: Must use node:22 (Debian/glibc) NOT node:22-alpine (musl libc).
# @astrojs/cloudflare depends on @cloudflare/workerd-linux-64 which is a
# glibc binary and will not run on Alpine Linux.
default:
  image: node:22

stages:
  - test
  - build
  - deploy

# ─── Test ───────────────────────────────────────────────────────────────────
test:typecheck:
  stage: test
  script:
    - npm ci
    # Use tsc directly — astro check tries to boot the workerd runtime
    - npx tsc --noEmit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|develop)$/'

# ─── Build ──────────────────────────────────────────────────────────────────
build:astro:
  stage: build
  variables:
    SUPABASE_URL: $SUPABASE_URL
    SUPABASE_KEY: $SUPABASE_KEY
    UPSTASH_REDIS_REST_URL: $UPSTASH_REDIS_REST_URL
    UPSTASH_REDIS_REST_TOKEN: $UPSTASH_REDIS_REST_TOKEN
    TMDB_API_KEY: $TMDB_API_KEY
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|develop)$/'

# ─── Deploy: Preview (MR only) ──────────────────────────────────────────────
deploy:preview:
  stage: deploy
  needs: [build:astro]
  variables:
    CLOUDFLARE_API_TOKEN: $CLOUDFLARE_API_TOKEN
    CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID
  script:
    - npm ci
    - npx wrangler pages deploy dist/ --project-name=freemoviesuggestion --branch=$CI_COMMIT_REF_SLUG
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    url: https://$CI_COMMIT_REF_SLUG.freemoviesuggestion.pages.dev
    on_stop: deploy:preview:stop
    auto_stop_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

deploy:preview:stop:
  stage: deploy
  needs: []
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Preview environment stopped."
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual

# ─── Deploy: Production (main branch only) ──────────────────────────────────
deploy:production:
  stage: deploy
  needs: [build:astro]
  script:
    - npm ci
    - CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID npx wrangler pages deploy dist/ --project-name=freemoviesuggestion --branch=main
  environment:
    name: production
    url: https://freemoviesuggestion.com
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

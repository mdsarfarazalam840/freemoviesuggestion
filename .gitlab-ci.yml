# GitLab CI/CD Pipeline — Astro + Cloudflare Workers
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   CLOUDFLARE_API_TOKEN     — Cloudflare API token with "Workers:Edit" permission
#   CLOUDFLARE_ACCOUNT_ID    — Your Cloudflare account ID
#   CLOUDFLARE_WORKERS_SUBDOMAIN — Optional override for workers.dev subdomain
#   SUPABASE_URL             — Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — Supabase service role key
#   UPSTASH_REDIS_REST_URL   — Upstash Redis REST URL
#   UPSTASH_REDIS_REST_TOKEN — Upstash Redis REST token
#   TMDB_API_KEY             — TMDB API key

# IMPORTANT: Must use node:22 (Debian/glibc) NOT node:22-alpine (musl libc).
# @astrojs/cloudflare depends on @cloudflare/workerd-linux-64 which is a
# glibc binary and will not run on Alpine Linux.
default:
  image: node:22

variables:
  PRODUCTION_WORKER_NAME: freemoviesuggestion
  CLOUDFLARE_WORKERS_SUBDOMAIN: md-sarfarazalam840
  WRANGLER_BIN: node --use-system-ca node_modules/wrangler/bin/wrangler.js

stages:
  - test
  - build
  - deploy

# ─── Test ───────────────────────────────────────────────────────────────────
test:typecheck:
  stage: test
  script:
    - npm ci
    # Generate .astro/types.d.ts so tsc can resolve astro:middleware and cloudflare:workers
    - npx astro sync
    - npx tsc --noEmit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|develop)$/'

# ─── Build ──────────────────────────────────────────────────────────────────
build:astro:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|develop)$/'

# ─── Deploy: Preview (MR only) ──────────────────────────────────────────────
deploy:preview:
  stage: deploy
  needs: [build:astro]
  script:
    - npm ci
    - |
      echo "=== Checking CI/CD Variables ==="
      if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
        echo "CLOUDFLARE_API_TOKEN: set (length: ${#CLOUDFLARE_API_TOKEN})"
      else
        echo "ERROR: CLOUDFLARE_API_TOKEN is NOT SET"
      fi
      if [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
        echo "CLOUDFLARE_ACCOUNT_ID: set (length: ${#CLOUDFLARE_ACCOUNT_ID})"
      else
        echo "ERROR: CLOUDFLARE_ACCOUNT_ID is NOT SET"
      fi
      if [ -n "$CLOUDFLARE_WORKERS_SUBDOMAIN" ]; then
        echo "CLOUDFLARE_WORKERS_SUBDOMAIN: set"
      else
        echo "ERROR: CLOUDFLARE_WORKERS_SUBDOMAIN is NOT SET"
      fi
    - $WRANGLER_BIN whoami
    - |
      missing=0
      for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_WORKERS_SUBDOMAIN SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN TMDB_API_KEY; do
        if [ -z "$(eval echo "\$$var")" ]; then
          echo "ERROR: $var is not set."
          missing=1
        fi
      done
      if [ "$missing" -ne 0 ]; then
        echo "Add them in Settings > CI/CD > Variables before deploying."
        exit 1
      fi
    # Set secrets for preview environment (using stdin redirection)
    - |
      PREVIEW_WORKER_NAME="$PRODUCTION_WORKER_NAME-$CI_COMMIT_REF_SLUG"
      printf '%s' "$SUPABASE_URL" | $WRANGLER_BIN secret put SUPABASE_URL --name "$PREVIEW_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | $WRANGLER_BIN secret put SUPABASE_SERVICE_ROLE_KEY --name "$PREVIEW_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$UPSTASH_REDIS_REST_URL" | $WRANGLER_BIN secret put UPSTASH_REDIS_REST_URL --name "$PREVIEW_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$UPSTASH_REDIS_REST_TOKEN" | $WRANGLER_BIN secret put UPSTASH_REDIS_REST_TOKEN --name "$PREVIEW_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$TMDB_API_KEY" | $WRANGLER_BIN secret put TMDB_API_KEY --name "$PREVIEW_WORKER_NAME" --config dist/server/wrangler.json
    - $WRANGLER_BIN deploy --name "$PRODUCTION_WORKER_NAME-$CI_COMMIT_REF_SLUG" --config dist/server/wrangler.json --keep-vars
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    url: https://$PRODUCTION_WORKER_NAME-$CI_COMMIT_REF_SLUG.$CLOUDFLARE_WORKERS_SUBDOMAIN.workers.dev
    on_stop: deploy:preview:stop
    auto_stop_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

deploy:preview:stop:
  stage: deploy
  needs: []
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Preview environment stopped."
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true

# ─── Deploy: Production (main branch only) ──────────────────────────────────
deploy:production:
  stage: deploy
  needs: [build:astro]
  script:
    - npm ci
    - |
      echo "=== Checking CI/CD Variables ==="
      if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
        echo "CLOUDFLARE_API_TOKEN: set (length: ${#CLOUDFLARE_API_TOKEN})"
      else
        echo "ERROR: CLOUDFLARE_API_TOKEN is NOT SET"
      fi
      if [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
        echo "CLOUDFLARE_ACCOUNT_ID: set (length: ${#CLOUDFLARE_ACCOUNT_ID})"
      else
        echo "ERROR: CLOUDFLARE_ACCOUNT_ID is NOT SET"
      fi
      if [ -n "$CLOUDFLARE_WORKERS_SUBDOMAIN" ]; then
        echo "CLOUDFLARE_WORKERS_SUBDOMAIN: set"
      else
        echo "ERROR: CLOUDFLARE_WORKERS_SUBDOMAIN is NOT SET"
      fi
    - $WRANGLER_BIN whoami
    - |
      missing=0
      for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_WORKERS_SUBDOMAIN SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN TMDB_API_KEY; do
        if [ -z "$(eval echo "\$$var")" ]; then
          echo "ERROR: $var is not set."
          missing=1
        fi
      done
      if [ "$missing" -ne 0 ]; then
        echo "Add them in Settings > CI/CD > Variables before deploying."
        exit 1
      fi
    # Set secrets for production (using stdin redirection)
    - |
      printf '%s' "$SUPABASE_URL" | $WRANGLER_BIN secret put SUPABASE_URL --name "$PRODUCTION_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | $WRANGLER_BIN secret put SUPABASE_SERVICE_ROLE_KEY --name "$PRODUCTION_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$UPSTASH_REDIS_REST_URL" | $WRANGLER_BIN secret put UPSTASH_REDIS_REST_URL --name "$PRODUCTION_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$UPSTASH_REDIS_REST_TOKEN" | $WRANGLER_BIN secret put UPSTASH_REDIS_REST_TOKEN --name "$PRODUCTION_WORKER_NAME" --config dist/server/wrangler.json
      printf '%s' "$TMDB_API_KEY" | $WRANGLER_BIN secret put TMDB_API_KEY --name "$PRODUCTION_WORKER_NAME" --config dist/server/wrangler.json
    - $WRANGLER_BIN deploy --name "$PRODUCTION_WORKER_NAME" --config dist/server/wrangler.json --keep-vars
  environment:
    name: production
    url: https://$PRODUCTION_WORKER_NAME.$CLOUDFLARE_WORKERS_SUBDOMAIN.workers.dev
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
